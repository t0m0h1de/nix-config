# escape キーの待機時間を短縮 (デフォルト500ms: neovim内でのEscキー遅延の原因)
set -sg escape-time 10
# フォーカスイベントを有効化 (neovimのautoread等を正常動作させる)
set -g focus-events on

# OSC 52 クリップボード連携
# - set-clipboard on: tmux copy-mode からのコピーで OSC 52 を使う
# - terminal-features: 利用中の端末に clipboard 機能(OSC 52)がある前提で有効化
set -s set-clipboard on
set -as terminal-features ",*:clipboard"

# ペインボーダーの色設定
# アクティブペインは明るいシアン、非アクティブはグレー
set -g pane-border-style "fg=#444444"
set -g pane-active-border-style "fg=#00bcd4,bold"
# アクティブか非アクティブかで色を分ける
set -g window-style 'bg=#2e313a'
set -g window-active-style 'bg=#292c33'

# マウス操作を有効にする
set-option -g mouse on
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e'"

# コピーモードを設定する
# コピーモードでvimキーバインドを使う
setw -g mode-keys vi

# ==============================================================
# vim-tmux-navigator
# vim/nvim splits と tmux panes を Ctrl+hjkl でシームレスに移動
# See: https://github.com/christoomey/vim-tmux-navigator
# ==============================================================
vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# prefix + H/J/K/L でペインサイズ変更
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# C-l (clear screen) を prefix + C-l で代替
bind C-l send-keys 'C-l'
